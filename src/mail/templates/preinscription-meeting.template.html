<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting scheduled - {{companyName}}</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 620px; margin: 0 auto; padding: 20px;">
  <div style="background-color: #f8fafc; padding: 28px; border-radius: 12px; border: 1px solid #e2e8f0;">
    <h2 style="margin-top: 0; color: #0f172a;">{{companyName}}</h2>
    <p style="margin: 0 0 18px 0; color: #64748b;">Pre-inscription meeting notification</p>

    <p>Hello <strong>{{studentName}}</strong>,</p>

    <p>Your meeting has been scheduled with <strong>{{commercialName}}</strong>.</p>

    <div style="margin: 22px 0; padding: 16px 18px; border-radius: 10px; background: #ffffff; border: 1px solid #dbeafe;">
      <p style="margin: 0 0 8px 0;"><strong>Date & time:</strong> {{meetingDateTime}}</p>
      <p style="margin: 0;"><strong>Notes:</strong> {{meetingNotes}}</p>
    </div>

    <p>Please make sure to be available at the scheduled time.</p>

    <p style="margin-top: 24px;">Best regards,<br><strong>{{companyName}}</strong></p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Request</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="background-color: #f8f9fa; padding: 30px; border-radius: 10px; border: 1px solid #dee2e6;">
    <h2 style="color: #007bff; margin-top: 0;">Password Reset Request</h2>
    
    <p>Hello <strong>{{username}}</strong>,</p>
    
    <p>You have requested to reset your password. Click the link below to reset it:</p>
    
    <div style="text-align: center; margin: 30px 0;">
      <a href="{{resetLink}}" style="background-color: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">Reset Password</a>
    </div>
    
    <p>This link will expire in 15 minutes.</p>
    
    <p style="color: #6c757d; font-size: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #dee2e6;">
      If you didn't request this, please ignore this email.
    </p>
  </div>
</body>
</html>

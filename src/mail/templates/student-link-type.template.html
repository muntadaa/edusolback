<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link shared with you - {{companyName}}</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="background-color: #f8f9fa; padding: 30px; border-radius: 10px; border: 1px solid #dee2e6;">
    <h2 style="color: #007bff; margin-top: 0;">{{companyName}}</h2>
    
    <p>Hello <strong>{{studentName}}</strong>,</p>
    
    <p>A link has been shared with you:</p>
    
    <div style="background-color: #ffffff; padding: 20px; border-radius: 5px; border-left: 4px solid #007bff; margin: 20px 0;">
      <p style="margin: 5px 0; font-size: 16px;"><strong>Title:</strong> {{title}}</p>
      <p style="margin: 10px 0 5px 0; font-size: 14px;"><strong>Link:</strong> {{linkDisplay}}</p>
      <p style="margin: 10px 0 5px 0; font-size: 14px;"><strong>Description:</strong></p>
      <p style="margin: 5px 0; font-size: 14px; white-space: pre-wrap;">{{description}}</p>
    </div>
    
    <p style="color: #6c757d; font-size: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #dee2e6;">
      If you didn't expect this email, please ignore it.
    </p>
  </div>
</body>
</html>
